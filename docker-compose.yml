services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - config.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SESSION_SERVICE_URI: "postgresql+asyncpg://adk_user:adk_password@postgres:5432/adk_history"
    command: ["uv", "run", "uvicorn", "app.server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - .:/app
    networks:
      - graphnet

  
  postgres: 
    image: pgvector/pgvector:pg15
    container_name: adk-postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: adk_user
      POSTGRES_PASSWORD: adk_password
      POSTGRES_DB: adk_history
    networks:
      - graphnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adk_user -d adk_history"] # Check both user AND db
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data: 

networks:
  graphnet:
    driver: bridge