name: Build DyResearch Agents Suite

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

jobs:

  # --- BUILD THE PYTHON ENGINE (Windows/Mac) ---
  build-engine:
    name: Build Engine on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Project & Build Engine
        run: |
          uv python install 3.12
          uv venv
          uv pip install . pyinstaller
          uv run python desktop_build.py
          

      # --- Packaging ---
      - name: Zip Release (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (Test-Path dist) {
              cd dist
              $folder = Get-ChildItem | Select-Object -First 1
              Compress-Archive -Path "$($folder.Name)\*" -DestinationPath ../DyResearch-Windows.zip
          }

      - name: Zip Release (Mac)
        if: matrix.os == 'macos-latest'
        run: |
          if [ -d "dist" ]; then
            cd dist && zip -r ../DyResearch-Mac.zip ./*
          else
            echo "Dist folder not found!"
            exit 1
          fi

      - name: Upload Engine Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.os }}
          path: DyResearch-*.zip